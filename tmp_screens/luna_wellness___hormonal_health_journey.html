</div>
<!-- Central Identity Cluster (The Anchor) -->
<div class="z-10 flex flex-col items-center gap-8">

<div class="relative group">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-2xl scale-125 transition-transform duration-1000"></div>

<div class="absolute inset-0 border-[3px] border-primary-fixed rounded-full opacity-30"></div>
</div>
</div>

                </p>
</div>
</div>

<p class="text-on-surface-variant text-sm leading-relaxed font-medium">

                </p>
</div>

<div class="w-full flex flex-col gap-6">

</button>

<button class="text-on-surface-variant font-label text-sm font-semibold tracking-wider hover:text-primary transition-colors uppercase">

                </button>
</div>
</div>

<div class="absolute bottom-8 z-10">
<div class="flex items-center gap-2">
<div class="h-[1px] w-4 bg-outline-variant"></div>
<span class="text-[10px] font-label font-bold text-outline uppercase tracking-widest">Version 2.4.0</span>
