<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-lowest": "#ffffff",
                      "tertiary-fixed": "#d8e2ff",
                      "tertiary": "#005ac2",
                      "on-tertiary": "#ffffff",
                      "on-primary-container": "#004b1e",
                      "on-tertiary-container": "#003d88",
                      "inverse-primary": "#4ae176",
                      "surface-container-high": "#dce9ff",
                      "on-tertiary-fixed": "#001a42",
                      "surface-dim": "#cbdbf5",
                      "surface-tint": "#006e2f",
                      "primary-fixed": "#6bff8f",
                      "tertiary-container": "#82abff",
                      "surface-bright": "#f8f9ff",
                      "on-surface": "#0b1c30",
                      "inverse-surface": "#213145",
                      "secondary-container": "#6df5e1",
                      "on-primary": "#ffffff",
                      "tertiary-fixed-dim": "#adc6ff",
                      "on-secondary": "#ffffff",
                      "surface-variant": "#d3e4fe",
                      "on-primary-fixed-variant": "#005321",
                      "background": "#f8f9ff",
                      "surface-container-highest": "#d3e4fe",
                      "outline-variant": "#bccbb9",
                      "outline": "#6d7b6c",
                      "inverse-on-surface": "#eaf1ff",
                      "error-container": "#ffdad6",
                      "secondary": "#006b5f",
                      "on-error-container": "#93000a",
                      "on-secondary-fixed-variant": "#005048",
                      "on-background": "#0b1c30",
                      "primary-container": "#22c55e",
                      "on-primary-fixed": "#002109",
                      "on-secondary-fixed": "#00201c",
                      "primary": "#006e2f",
                      "secondary-fixed": "#71f8e4",
                      "on-tertiary-fixed-variant": "#004395",
                      "error": "#ba1a1a",
                      "on-error": "#ffffff",
                      "surface-container-low": "#eff4ff",
                      "on-secondary-container": "#006f64",
                      "on-surface-variant": "#3d4a3d",
                      "surface-container": "#e5eeff",
                      "surface": "#f8f9ff",
                      "primary-fixed-dim": "#4ae176",
                      "secondary-fixed-dim": "#4fdbc8"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "2xl": "1rem",
                      "3xl": "1.5rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Manrope"],
                      "body": ["Manrope"],
                      "label": ["Manrope"]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #006e2f 0%, #006b5f 100%);
        }
        .glass-panel {
            background: rgba(239, 244, 255, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background min-h-screen flex flex-col">
<!-- Top Navigation Suppression: Onboarding is transactional -->
<main class="flex-grow flex flex-col items-center justify-start px-6 pt-12 pb-24 max-w-2xl mx-auto w-full">
<!-- Header Section -->
<header class="w-full mb-10 text-left">
<div class="flex items-center gap-2 mb-4">
<div class="h-1 w-12 rounded-full bg-primary"></div>
<div class="h-1 w-12 rounded-full bg-primary"></div>
<div class="h-1 w-12 rounded-full bg-primary"></div>
</div>
<h1 class="text-4xl font-headline font-extrabold tracking-tight text-on-surface mb-2">Refining Your Path</h1>
<p class="text-on-surface-variant text-lg leading-relaxed">Customize Luna Wellness to your unique rhythm and health objectives.</p>
</header>
<!-- Goals Selection: Bento-ish Grid -->
<section class="w-full mb-12">
<h2 class="text-sm font-label font-bold uppercase tracking-widest text-on-surface-variant mb-6">Select Your Goals</h2>
<div class="grid grid-cols-2 gap-4">
<!-- Card: PCOS -->
<button class="relative group text-left p-6 rounded-3xl bg-surface-container-lowest border-2 border-transparent hover:border-primary/20 transition-all duration-300 shadow-[0_12px_40px_rgba(11,28,48,0.03)] focus:ring-2 focus:ring-primary/20">
<div class="w-12 h-12 rounded-2xl bg-secondary/10 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-secondary">spa</span>
</div>
<span class="block font-headline font-bold text-lg text-on-surface">PCOS</span>
<span class="block text-sm text-on-surface-variant mt-1">Hormonal Balance</span>
<div class="absolute top-4 right-4 w-6 h-6 rounded-full border-2 border-outline-variant group-active:bg-primary group-active:border-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-white hidden group-active:block" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</button>
<!-- Card: Weight Loss -->
<button class="relative group text-left p-6 rounded-3xl bg-surface-container-lowest border-2 border-transparent hover:border-primary/20 transition-all duration-300 shadow-[0_12px_40px_rgba(11,28,48,0.03)] focus:ring-2 focus:ring-primary/20">
<div class="w-12 h-12 rounded-2xl bg-primary/10 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary">monitor_weight</span>
</div>
<span class="block font-headline font-bold text-lg text-on-surface">Weight Loss</span>
<span class="block text-sm text-on-surface-variant mt-1">Sustainable Vitality</span>
<div class="absolute top-4 right-4 w-6 h-6 rounded-full border-2 border-outline-variant group-active:bg-primary group-active:border-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-white hidden group-active:block" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</button>
<!-- Card: Thyroid -->
<button class="relative group text-left p-6 rounded-3xl bg-surface-container-lowest border-2 border-transparent hover:border-primary/20 transition-all duration-300 shadow-[0_12px_40px_rgba(11,28,48,0.03)] focus:ring-2 focus:ring-primary/20">
<div class="w-12 h-12 rounded-2xl bg-tertiary/10 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-tertiary">ecg_heart</span>
</div>
<span class="block font-headline font-bold text-lg text-on-surface">Thyroid</span>
<span class="block text-sm text-on-surface-variant mt-1">Metabolic Support</span>
<div class="absolute top-4 right-4 w-6 h-6 rounded-full border-2 border-outline-variant group-active:bg-primary group-active:border-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-white hidden group-active:block" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</button>
<!-- Card: Fitness -->
<button class="relative group text-left p-6 rounded-3xl bg-surface-container-lowest border-2 border-transparent hover:border-primary/20 transition-all duration-300 shadow-[0_12px_40px_rgba(11,28,48,0.03)] focus:ring-2 focus:ring-primary/20">
<div class="w-12 h-12 rounded-2xl bg-secondary-container/30 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-on-secondary-container">fitness_center</span>
</div>
<span class="block font-headline font-bold text-lg text-on-surface">Fitness</span>
<span class="block text-sm text-on-surface-variant mt-1">Strength &amp; Stamina</span>
<div class="absolute top-4 right-4 w-6 h-6 rounded-full border-2 border-outline-variant group-active:bg-primary group-active:border-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-white hidden group-active:block" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</button>
</div>
</section>
<!-- Lifestyle Section: Card-based -->
<section class="w-full space-y-8">
<h2 class="text-sm font-label font-bold uppercase tracking-widest text-on-surface-variant mb-6">Lifestyle Insights</h2>
<!-- Question 1: Activity Level -->
<div class="bg-surface-container-low rounded-3xl p-8 transition-all hover:bg-surface-container">
<label class="block text-xl font-headline font-bold text-on-surface mb-6">How active is your daily routine?</label>
<div class="flex flex-col gap-3">
<button class="w-full flex justify-between items-center px-6 py-4 rounded-2xl bg-surface-container-lowest hover:bg-white transition-colors group">
<span class="font-semibold text-on-surface">Sedentary</span>
<div class="w-5 h-5 rounded-full border-2 border-outline group-focus:border-primary group-focus:bg-primary transition-all"></div>
</button>
<button class="w-full flex justify-between items-center px-6 py-4 rounded-2xl bg-surface-container-lowest hover:bg-white transition-colors group">
<span class="font-semibold text-on-surface">Moderately Active</span>
<div class="w-5 h-5 rounded-full border-2 border-outline group-focus:border-primary group-focus:bg-primary transition-all"></div>
</button>
<button class="w-full flex justify-between items-center px-6 py-4 rounded-2xl bg-surface-container-lowest hover:bg-white transition-colors group">
<span class="font-semibold text-on-surface">Highly Active</span>
<div class="w-5 h-5 rounded-full border-2 border-outline group-focus:border-primary group-focus:bg-primary transition-all"></div>
</button>
</div>
</div>
<!-- Question 2: Dietary Preferences -->
<div class="bg-surface-container-low rounded-3xl p-8 transition-all hover:bg-surface-container">
<label class="block text-xl font-headline font-bold text-on-surface mb-6">Your dietary preference?</label>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-3 rounded-full bg-surface-container-lowest border border-transparent hover:border-primary text-on-surface font-medium transition-all">Omnivore</button>
<button class="px-5 py-3 rounded-full bg-surface-container-lowest border border-transparent hover:border-primary text-on-surface font-medium transition-all">Vegetarian</button>
<button class="px-5 py-3 rounded-full bg-surface-container-lowest border border-transparent hover:border-primary text-on-surface font-medium transition-all">Vegan</button>
<button class="px-5 py-3 rounded-full bg-surface-container-lowest border border-transparent hover:border-primary text-on-surface font-medium transition-all">Keto</button>
<button class="px-5 py-3 rounded-full bg-surface-container-lowest border border-transparent hover:border-primary text-on-surface font-medium transition-all">Paleo</button>
</div>
</div>
</section>
<!-- AI Insight Note -->
<section class="mt-12 w-full p-6 bg-tertiary-container/20 rounded-3xl border border-tertiary-container/30 relative overflow-hidden">
<div class="relative z-10 flex gap-4 items-start">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<div>
<p class="text-on-tertiary-container font-bold mb-1">Luna Intelligence</p>
<p class="text-sm text-on-tertiary-container/80 leading-relaxed">We use these insights to tailor your nutrition and workout plans. Our engine adapts to your hormonal cycle for optimal results.</p>
</div>
</div>
<!-- Decorative Inner Glow -->
<div class="absolute -right-10 -bottom-10 w-32 h-32 bg-tertiary/10 blur-3xl rounded-full"></div>
</section>
<!-- Fixed Bottom Action Bar (Transactional Onboarding Style) -->
<div class="fixed bottom-0 left-0 w-full p-6 glass-panel flex justify-center z-50">
<div class="max-w-2xl w-full flex gap-4">
<button class="flex-1 py-4 px-8 rounded-3xl bg-surface-container-highest text-primary font-bold transition-all active:scale-95">Back</button>
<button class="flex-[2] py-4 px-8 rounded-3xl signature-gradient text-white font-extrabold text-lg shadow-xl shadow-primary/20 transition-all active:scale-95 hover:opacity-90">Finish</button>
</div>
</div>
</main>
<!-- Decoration: Background Soft Gradients -->
<div class="fixed top-0 right-0 -z-10 opacity-20">
<div class="w-[500px] h-[500px] bg-gradient-to-br from-secondary-fixed to-transparent blur-[120px] rounded-full"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 opacity-10">
<div class="w-[400px] h-[400px] bg-gradient-to-tr from-primary-fixed to-transparent blur-[100px] rounded-full"></div>
</div>
</body></html>
