      .input-focus:focus-within {
        background-color: #ffffff;
        box-shadow: 0 0 0 2px #b7004e;

<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col items-center justify-center p-6 sm:p-8">
<!-- Auth Container -->
<main class="w-full max-w-md space-y-12">
<!-- Branding Section -->
<header class="text-center space-y-4">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container/10 mb-2">
<span class="text-3xl font-black text-primary italic tracking-tighter font-headline">L</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface">Luna</h1>
<p class="text-on-surface-variant font-medium text-lg leading-relaxed px-4">Your personalized space for hormonal harmony.</p>
</header>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-lg p-8 shadow-[0px_20px_40px_rgba(24,27,39,0.04)]">
<form class="space-y-6">
<!-- Input: Email/Phone -->
<div class="space-y-2">
<label class="block font-headline text-sm font-bold text-on-surface-variant ml-1" for="identity">Email or Phone</label>
<div class="relative flex items-center bg-surface-container-high rounded-full px-5 py-4 transition-all input-focus">
<span class="material-symbols-outlined text-outline mr-3" data-icon="mail">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-outline font-medium" id="identity" name="identity" placeholder="Enter your details" type="text"/>
</div>
</div>
<!-- Input: Password -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block font-headline text-sm font-bold text-on-surface-variant" for="password">Password</label>
<a class="text-sm font-bold text-primary hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center bg-surface-container-high rounded-full px-5 py-4 transition-all input-focus">
<span class="material-symbols-outlined text-outline mr-3" data-icon="lock">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-outline font-medium" id="password" name="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined text-outline ml-3 cursor-pointer" data-icon="visibility">visibility</span>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary-gradient text-on-primary font-headline font-bold py-4 rounded-full shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
                    Sign In
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-10">
<div class="flex-grow h-px bg-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-sm font-bold text-outline uppercase tracking-widest font-label">or continue with</span>
<div class="flex-grow h-px bg-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-low hover:bg-surface-container-high transition-colors py-4 rounded-full">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google G icon for social login integration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZ7g5Nrm54VmnA_HJZygBTGC8rsku0UVX1ifkq5pKKn1Z_pD7y0uxxOhGZkJ5WHVWD6_NzMDqaiGZXU-REg1ouqsLlwSn1TaTWw01hkFWcG1PcckR3_lbpCW_klwr9whfD3CrQuN6QmJKISbrjzp-tv21hvWgMTCV_6K2kCNhJjX4cp4JiR5HAI4aay3YBPK43uYGQYHTn3qVPhVFvMU4G2c94CIsRQdVjzCULPi3G1RiGFl0XY8AXa1JjmdzvSnA9FfkcyA9ygRg"/>
<span class="font-headline font-bold text-sm text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-on-surface text-surface py-4 rounded-full hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined text-xl" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-headline font-bold text-sm">Apple</span>
</button>
</div>
</div>
<!-- Footer Call to Action -->
<footer class="text-center">
<p class="text-on-surface-variant font-medium">
                Don't have an account? 
                <a class="text-primary font-bold ml-1 hover:underline transition-all" href="#">Sign up</a>
</p>
</footer>
</main>
<!-- Background Decoration (Asymmetric Editorial Style) -->
<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-fixed/30 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-surface-container-highest rounded-full blur-[100px] -z-10"></div>
<!-- Featured Visual (Editorial Bento Style Element) -->
<div class="hidden lg:block fixed left-16 top-1/2 -translate-y-1/2 max-w-sm space-y-8">
<div class="bg-surface-container-low p-8 rounded-lg shadow-sm">
<div class="flex items-center gap-4 mb-6">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-white">
<span class="material-symbols-outlined" data-icon="cycle">cycle</span>
</div>
<div>
<h3 class="font-headline font-bold text-on-surface">Follicular Phase</h3>
<p class="text-sm text-on-surface-variant">Day 8 of your cycle</p>
</div>
</div>
<div class="space-y-3">
<div class="h-2 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary w-[35%] rounded-full"></div>
</div>
<p class="text-sm italic text-primary font-medium">Your energy is rising. It's a great time for creative projects.</p>
</div>
</div>

</div>
